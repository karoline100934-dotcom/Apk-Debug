name: Magic Setup Android

on: 
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Generate All Files
      run: |
        # Bikin semua folder yang dibutuhkan
        mkdir -p app/src/main/java/com/example/myapp
        mkdir -p .github/workflows
        
        # Bikin settings.gradle
        cat << 'EOF' > settings.gradle
        rootProject.name = "Apk-Debug"
        include ':app'
        EOF
        
        # Bikin build.gradle (Project)
        cat << 'EOF' > build.gradle
        buildscript {
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath "com.android.tools.build:gradle:8.1.1"
            }
        }
        allprojects {
            repositories {
                google()
                mavenCentral()
            }
        }
        EOF
        
        # Bikin app/build.gradle
        cat << 'EOF' > app/build.gradle
        plugins {
            id 'com.android.application'
        }
        android {
            namespace 'com.example.myapp'
            compileSdk 33
            defaultConfig {
                applicationId "com.example.myapp"
                minSdk 21
                targetSdk 33
                versionCode 1
                versionName "1.0"
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
        }
        EOF
        
        # Bikin AndroidManifest.xml
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.example.myapp">
            <application
                android:allowBackup="true"
                android:label="My Debug App"
                android:theme="@style/Theme.AppCompat">
                <activity
                    android:name=".MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF
        
        # Bikin MainActivity.java
        cat << 'EOF' > app/src/main/java/com/example/myapp/MainActivity.java
        package com.example.myapp;
        import android.os.Bundle;
        import androidx.appcompat.app.AppCompatActivity;
        public class MainActivity extends AppCompatActivity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
            }
        }
        EOF

        # Bikin Script Pembuat APK Otomatis (biar nanti lo tinggal terima jadi)
        cat << 'EOF' > .github/workflows/android-build.yml
        name: Android CI
        on:
          push:
            branches: [ "main" ]
        jobs:
          build:
            runs-on: ubuntu-latest
            steps:
            - uses: actions/checkout@v4
            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                java-version: '17'
                distribution: 'temurin'
            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v3
              with:
                gradle-version: 8.1.1
            - name: Build Debug APK
              run: gradle assembleDebug
            - name: Upload APK
              uses: actions/upload-artifact@v4
              with:
                name: My-Debug-APK
                path: app/build/outputs/apk/debug/*.apk
        EOF

    - name: Commit and Push to GitHub
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        git commit -m "Sulap: Auto-generate seluruh struktur Android"
        git push
